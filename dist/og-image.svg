<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow-center" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="#059669" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-brain" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="brain-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="text-glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#080c10"/>

  <!-- Subtle grid lines -->
  <g stroke="#10b981" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Large ambient glow behind brain -->
  <ellipse cx="600" cy="280" rx="320" ry="260" fill="url(#glow-center)"/>

  <!-- Closer glow ring -->
  <ellipse cx="600" cy="270" rx="160" ry="130" fill="url(#glow-brain)"/>

  <!-- Brain icon — scaled up to ~160px, centered at 600,260 -->
  <g transform="translate(490, 150) scale(6.67)" filter="url(#brain-glow)" fill="none" stroke="#34d399" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/>
    <path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/>
    <path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/>
    <path d="M17.599 6.5a3 3 0 0 0 .399-1.375"/>
    <path d="M6.003 5.125A3 3 0 0 0 6.401 6.5"/>
    <path d="M3.477 10.896a4 4 0 0 1 .585-.396"/>
    <path d="M19.938 10.5a4 4 0 0 1 .585.396"/>
    <path d="M6 18a4 4 0 0 1-1.967-.516"/>
    <path d="M19.967 17.484A4 4 0 0 1 18 18"/>
  </g>

  <!-- BrainLead wordmark -->
  <text
    x="600" y="450"
    font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="72"
    font-weight="700"
    fill="#f0fdf4"
    text-anchor="middle"
    letter-spacing="-1"
    filter="url(#text-glow)"
  >BrainLead</text>

  <!-- Tagline -->
  <text
    x="600" y="510"
    font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="28"
    font-weight="400"
    fill="#6ee7b7"
    text-anchor="middle"
    letter-spacing="0.5"
    opacity="0.85"
  >Transforme leads em vendas</text>

  <!-- Subtle bottom accent line -->
  <rect x="520" y="542" width="160" height="2" rx="1" fill="#10b981" opacity="0.5"/>
</svg>
